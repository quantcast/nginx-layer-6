daemon off;

events {
    worker_connections 512;
}

httplite {
    server {
        listen 8888;
        server_name 192.168.1.1;
    }

    upstreams {
        keep-alive 5000;
        server 127.0.0.1:8889 connections=5;
        server 127.0.0.1:8890;
        server 127.0.0.1:8891 connections=10;
    }
}
