daemon off;
master_process off;
error_log logs/error.log debug;

events {
    worker_connections 512;
}

http {
    upstream backend {
        server localhost:8889;
    }

    server {
        listen 8888;
        server_name localhost;

        location / {
            proxy_pass http://backend;
            
            # Disable load balancing
            proxy_next_upstream off;
        }
    }
}
